DATASET:
  dataset : "fl_cifar100"
  communication_epoch : 200
  n_classes: 100
  parti_num: 10 #
  aug: "weak"
  beta: 0.5
  backbone: "resnet10"

OPTIMIZER:
  type: 'SGD'
  momentum: 0.9
  weight_decay: 1e-5
  local_epoch: 5
  local_train_batch: 50
  local_test_batch: 50
  val_batch: 50
  local_train_lr: 1e-3
