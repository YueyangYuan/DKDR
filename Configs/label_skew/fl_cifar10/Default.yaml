DATASET:
  dataset : "fl_cifar10"
  communication_epoch : 200
  n_classes: 10
  parti_num: 10
  aug: "weak"
  beta: 0.5
  backbone: "fedavg_cifar"

OPTIMIZER:
  type: 'SGD'
  momentum: 0.9
  weight_decay: 1e-5
  local_epoch: 5  # 10
  local_train_batch: 64
  local_test_batch: 64
  val_batch: 64
  local_train_lr: 1e-3 # 0.01
