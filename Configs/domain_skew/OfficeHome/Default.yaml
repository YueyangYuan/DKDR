DATASET:
  dataset : "OfficeHome"
  communication_epoch : 200
  n_classes: 65
  parti_num: 20
  online_ratio: 1.0
  domain_ratio: 0.1
  train_eval_domain_ratio: 0.3
  backbone: "resnet18"
  pretrained: False # True False
  aug: "weak"

OPTIMIZER:
  type: 'SGD'
  momentum: 0.9
  weight_decay: 1e-5
  local_epoch: 5 # 10
  local_train_batch: 16
  local_test_batch: 16
  val_batch: 16
  local_train_lr: 0.001 # 0.01
